name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  structural-catalog-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: bash scripts/check_quality.sh
        env:
          GIT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD: ${{ github.sha }}
